name: CI

on:
  push:
    branches: [master]
    tags-ignore: ['v*']
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run compile
      - run: npx vsce package --allow-missing-repository
      - uses: actions/upload-artifact@v4
        with:
          name: unity-for-cursor-vsix
          path: '*.vsix'
